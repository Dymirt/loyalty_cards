{% load i18n %}
<div>
    <label for="{{ field.id_for_label }}" class="portal-label">{{ field.label }}</label>
    {{ field }}
    {% if field.help_text %}<p class="portal-help" id="{{ field.id_for_label }}_help">{{ field.help_text }}</p>{% endif %}
    {% for error in field.errors %}<p class="portal-error" role="alert">{{ error }}</p>{% endfor %}
</div>
