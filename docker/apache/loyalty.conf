ServerName localhost
ServerTokens Prod
ServerSignature Off
TraceEnable Off
LimitRequestFieldSize 8190
LimitRequestLine 8190
LimitRequestBody 67108864

# Deliberately omit the query string. Connector callbacks may contain a
# short-lived credential and must never be copied into access logs.
LogFormat "%a %t \"%m %U %H\" %>s %b" loyalty_safe

WSGIScriptAlias / /var/www/loyalty_platform/loyalty_platform/wsgi.py
WSGIPythonPath /var/www/loyalty_platform
WSGIDaemonProcess django processes=1 threads=3 \
    python-home=/opt/venv \
    python-path=/var/www/loyalty_platform
WSGIProcessGroup django
# cryptography's PyO3 extension must run in the daemon process's main Python
# interpreter. The site has its own single daemon process group, so this does
# not mix application module namespaces.
WSGIApplicationGroup %{GLOBAL}

<VirtualHost *:80>
    UseCanonicalName Off
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/loyalty_platform/staticfiles

    Alias /static/ /var/www/loyalty_platform/staticfiles/
    <Directory /var/www/loyalty_platform/staticfiles/>
        Require all granted
        AllowOverride None
        Options -Indexes -ExecCGI -Includes +FollowSymLinks
        Header always set X-Content-Type-Options "nosniff"
    </Directory>

    <Directory /var/www/loyalty_platform/loyalty_platform/>
        <Files wsgi.py>
            Require all granted
        </Files>
    </Directory>

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 loyalty_safe
</VirtualHost>
