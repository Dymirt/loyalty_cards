name: Loyalty platform CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: loyalty-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      DJANGO_SECRET_KEY: ci-only-9e53f07c0cae4a398ff58efc38d095952cbe8af4d31a4f7e89c624b90d155f31
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: testserver,localhost
      DJANGO_CSRF_TRUSTED_ORIGINS: https://testserver
      DJANGO_TRUST_X_FORWARDED_PROTO: "True"
      DJANGO_SECURE_SSL_REDIRECT: "True"
      DJANGO_SESSION_COOKIE_SECURE: "True"
      DJANGO_CSRF_COOKIE_SECURE: "True"
      DJANGO_SECURE_HSTS_SECONDS: "31536000"
      DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: "True"
      DJANGO_SECURE_HSTS_PRELOAD: "True"
      APP_BASE_URL: https://testserver
      DB_ENGINE: django.db.backends.sqlite3
      DB_NAME: /tmp/loyalty-ci.sqlite3
      EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend
      LOYALTY_LOG_LEVEL: WARNING
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install Python dependencies and audit tool
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-production.txt pip-audit
          python -m pip check
      - name: Install pinned frontend build dependencies
        run: npm ci
      - name: Django schema and deployment checks
        run: |
          python manage.py check
          python manage.py check --deploy --fail-level WARNING
          python manage.py makemigrations --check --dry-run
          python manage.py migrate --noinput
          python manage.py migrate --plan
          python manage.py verify_app_extraction --strict
      - name: Test application with external calls blocked
        env:
          DJANGO_SECURE_SSL_REDIRECT: "False"
        run: python manage.py test --noinput
      - name: Build committed static assets
        run: |
          npm run build
          git diff --exit-code -- static/css/portal.v1.css static/vendor
      - name: Dependency vulnerability checks
        run: |
          pip-audit -r requirements-production.txt
          npm audit --audit-level=high

  mariadb-integration:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    services:
      mariadb:
        image: mariadb:10.11.11
        env:
          MARIADB_ROOT_PASSWORD: ci-root-password
          MARIADB_ROOT_HOST: "%"
          MARIADB_DATABASE: loyalty_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DJANGO_SECRET_KEY: ci-only-9e53f07c0cae4a398ff58efc38d095952cbe8af4d31a4f7e89c624b90d155f31
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: testserver,localhost
      DJANGO_CSRF_TRUSTED_ORIGINS: https://testserver
      DJANGO_TRUST_X_FORWARDED_PROTO: "True"
      DJANGO_SECURE_SSL_REDIRECT: "True"
      DJANGO_SESSION_COOKIE_SECURE: "True"
      DJANGO_CSRF_COOKIE_SECURE: "True"
      DJANGO_SECURE_HSTS_SECONDS: "31536000"
      DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: "True"
      DJANGO_SECURE_HSTS_PRELOAD: "True"
      APP_BASE_URL: https://testserver
      DB_ENGINE: django.db.backends.mysql
      DB_NAME: loyalty_ci
      DB_USER: root
      DB_PASSWORD: ci-root-password
      DB_HOST: 127.0.0.1
      DB_PORT: "3306"
      DB_CONN_MAX_AGE: "0"
      EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend
      LOYALTY_LOG_LEVEL: WARNING
      TENANT_SECRETS_ENCRYPTION_KEYS: QUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUE=
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install production dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-production.txt
          python -m pip check
      - name: Validate migrations against MariaDB 10.11
        run: |
          python manage.py check
          python manage.py makemigrations --check --dry-run
          python manage.py migrate --noinput
          python manage.py migrate --plan
          python manage.py verify_app_extraction --strict
      - name: Test against MariaDB with external calls blocked
        env:
          DJANGO_SECURE_SSL_REDIRECT: "False"
        run: python manage.py test --noinput
